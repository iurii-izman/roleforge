<table class="table">
  <tr><th align="left">id</th><th align="left">name</th><th align="left">enabled</th></tr>
  {% if monitors|length == 0 %}
    <tr><td colspan="3" class="muted">No monitors configured in config/monitors.yaml</td></tr>
  {% endif %}
  {% for m in monitors %}
    <tr>
      <td><code>{{ m.id }}</code></td>
      <td>{{ m.name }}</td>
      <td>
        <button
          hx-post="/sources/monitors/{{ m.id }}/toggle?enabled={{ 'false' if m.enabled else 'true' }}"
          hx-target="#monitors-table"
          hx-swap="innerHTML"
          class="btn"
        >
          {{ 'enabled' if m.enabled else 'disabled' }}
        </button>
      </td>
    </tr>
  {% endfor %}
</table>
