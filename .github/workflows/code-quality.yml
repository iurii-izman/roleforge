# Tests, coverage, and SonarQube/SonarCloud analysis.
# Requires: GitHub repo secret SONAR_TOKEN (SonarCloud) or SONAR_TOKEN + SONAR_HOST_URL (self-hosted).

name: Code quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: |
          PYTHONPATH=. coverage run -m unittest discover -s tests -p "test_*.py" -v

      - name: Coverage XML
        run: coverage xml -o coverage.xml

      - name: SonarCloud Scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.python.coverage.reportPaths=coverage.xml
