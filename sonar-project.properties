# SonarQube / SonarCloud analysis (Python).
# Project key and organization: set in SonarCloud UI or via env in CI (e.g. SONAR_PROJECT_KEY, SONAR_ORGANIZATION).

sonar.sources=roleforge
sonar.tests=tests
sonar.python.version=3

# Exclude non-source and generated paths from analysis (fewer false positives, clearer duplication).
sonar.exclusions=**/__pycache__/**,**/.venv/**,**/venv/**,**/node_modules/**,**/.git/**,**/schema/*.sql,**/docs/**,**/config/**

# Test exclusions (tests are in sonar.tests; exclude their caches).
sonar.test.exclusions=**/__pycache__/**

# Coverage report path (CI must run coverage and produce this before the scanner).
# coverage run -m unittest discover -s tests -p "test_*.py"; coverage xml -o coverage.xml
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8
